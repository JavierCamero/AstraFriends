<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Javier Camero - Sistema Astral</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@0,900;1,900&family=Roboto+Mono:wght@700&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
            user-select: none;
            touch-action: none;
        }

        .f-sans { font-family: 'Inter', sans-serif; }
        .f-serif { font-family: 'Playfair Display', serif; }
        .f-mono { font-family: 'Roboto Mono', monospace; }

        .astro-word {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            z-index: 50;
            text-align: center;
            white-space: nowrap;
            transition: all 1.8s cubic-bezier(0.19, 1, 0.22, 1), opacity 1s ease;
        }

        #particle-canvas, #constellation-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #particle-canvas { z-index: 1; }
        #constellation-canvas { z-index: 2; pointer-events: none; }

        .eclipse-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            z-index: 10;
        }

        .eclipse-black {
            position: absolute;
            inset: 0;
            background: #020617;
            border-radius: 50%;
            box-shadow: inset 0 0 20px rgba(99, 102, 241, 0.4), 0 0 30px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        /* Contenedor de letras individuales */
        #angeles-container {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .letter {
            display: inline-block;
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 24px;
            color: white;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 30px rgba(99, 102, 241, 0.8);
            transition: all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #formation-btn {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.4);
            padding: 12px 24px;
            border-radius: 20px;
            color: #c7d2fe;
            font-size: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.4s ease;
        }

        #final-dialog {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .dialog-content {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 2.5rem;
            border-radius: 2rem;
            text-align: center;
            max-width: 90vw;
        }

        .instructions-pulse { animation: pulse-glow 2s infinite; }
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body class="f-sans text-white">

    <canvas id="particle-canvas"></canvas>
    <canvas id="constellation-canvas"></canvas>

    <div id="app-container" class="relative w-full h-full flex flex-col items-center justify-between">
        
        <div id="header-hint" class="mt-12 z-20 pointer-events-none transition-opacity duration-1000">
            <div class="bg-indigo-500/10 backdrop-blur-md px-6 py-3 rounded-full border border-indigo-400/30 shadow-[0_0_20px_rgba(99,102,241,0.2)] flex items-center gap-3 instructions-pulse">
                <div class="w-2 h-2 bg-indigo-300 rounded-full animate-ping"></div>
                <span class="text-indigo-100 text-[9px] font-bold tracking-[0.4em] uppercase">Toca el vacío para invocar</span>
            </div>
        </div>

        <div class="eclipse-container">
            <div class="eclipse-black">
                <div id="angeles-container">
                    <span class="letter">A</span>
                    <span class="letter">N</span>
                    <span class="letter">G</span>
                    <span class="letter">E</span>
                    <span class="letter">L</span>
                    <span class="letter">E</span>
                    <span class="letter">S</span>
                </div>
            </div>
        </div>

        <button id="formation-btn" class="hidden">INICIAR RITUAL</button>

        <div id="astros-layer" class="absolute inset-0"></div>

        <div class="mb-10 flex flex-col items-center pointer-events-none z-20">
            <div class="flex items-center gap-3 text-white">
                <div class="h-[1px] w-12 bg-gradient-to-r from-transparent to-indigo-500"></div>
                <span class="text-2xl font-black tracking-tighter bg-gradient-to-b from-white to-indigo-400 bg-clip-text text-transparent uppercase">Javier Camero</span>
                <div class="h-[1px] w-12 bg-gradient-to-l from-transparent to-indigo-500"></div>
            </div>
        </div>
    </div>

    <div id="final-dialog">
        <div class="dialog-content">
            <h2 id="dialog-text" class="text-xl font-bold tracking-widest text-indigo-100 mb-8 uppercase">¿Te gustó?</h2>
            <div id="dialog-actions" class="flex gap-4 justify-center">
                <button onclick="answer(true)" class="px-8 py-2 bg-indigo-600/20 border border-indigo-400/40 rounded-full hover:bg-indigo-500/40 transition-all uppercase text-xs tracking-widest">Sí</button>
            </div>
        </div>
    </div>

    <script>
        const frasesJavier = [
            "¡Eres lo mejor!", "Tú puedes", "No te dejes tumbar", "Sigue adelante", 
            "No todo está perdido", "Vales demasiado", "Fuerza infinita", "Cree en ti", "Eres luz",
            "Confía en ti", "Potencial infinito", "Un paso a la vez", "Éxito diario", "Hazlo con pasión",
            "Sin miedo al fallo", "Tu sonrisa brilla", "Tu actitud lo es todo", "ATT: Javier Camero",
            "La tormenta pasará", "No es inmadurez, es libertad"
        ];

        const formationCoords = [
            {x: 0, y: -160}, {x: -20, y: -120}, {x: -40, y: -80}, {x: -60, y: -40}, {x: -80, y: 0}, 
            {x: 20, y: -120}, {x: 40, y: -80}, {x: 60, y: -40}, {x: 80, y: 0},
            {x: -30, y: -40}, {x: 0, y: -40}, {x: 30, y: -40}
        ];

        let astros = [];
        let particles = [];
        let constellationStars = [];
        let centerX = window.innerWidth / 2;
        let centerY = window.innerHeight / 2;
        let interactionCount = 0;
        let isSequenceRunning = false;

        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');
        const cCanvas = document.getElementById('constellation-canvas');
        const cCtx = cCanvas.getContext('2d');
        const formationBtn = document.getElementById('formation-btn');
        const angelesContainer = document.getElementById('angeles-container');
        const letters = document.querySelectorAll('.letter');

        function initParticles() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
            cCanvas.width = window.innerWidth;
            cCanvas.height = window.innerHeight;
            particles = Array.from({length: 100}, () => ({
                x: Math.random() * pCanvas.width,
                y: Math.random() * pCanvas.height,
                size: Math.random() * 1.2,
                speedX: (Math.random() - 0.5) * 0.2,
                speedY: (Math.random() - 0.5) * 0.2,
                opacity: Math.random()
            }));
        }

        function drawParticles() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            pCtx.fillStyle = '#a5b4fc';
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if (p.x < 0) p.x = pCanvas.width;
                if (p.x > pCanvas.width) p.x = 0;
                if (p.y < 0) p.y = pCanvas.height;
                if (p.y > pCanvas.height) p.y = 0;
                pCtx.globalAlpha = p.opacity;
                pCtx.beginPath(); pCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2); pCtx.fill();
            });
            requestAnimationFrame(drawParticles);
        }

        function drawConstellation() {
            cCtx.clearRect(0, 0, cCanvas.width, cCanvas.height);
            if (constellationStars.length === 0) return;

            cCtx.strokeStyle = 'rgba(165, 180, 252, 0.2)';
            cCtx.lineWidth = 1;
            cCtx.beginPath();
            constellationStars.forEach((s, i) => {
                if (i === 0) cCtx.moveTo(s.x, s.y);
                else cCtx.lineTo(s.x, s.y);
                
                // Brillo de estrella
                cCtx.fillStyle = 'white';
                cCtx.shadowBlur = 10;
                cCtx.shadowColor = 'white';
                cCtx.fillRect(s.x-1, s.y-1, 3, 3);
                cCtx.shadowBlur = 0;
            });
            cCtx.stroke();
            requestAnimationFrame(drawConstellation);
        }

        function spawnAstro(x, y) {
            if (isSequenceRunning) return;
            if (interactionCount === 0) document.getElementById('header-hint').style.opacity = '0';
            interactionCount++;
            if (interactionCount >= 6) formationBtn.classList.remove('hidden');

            const astro = {
                text: frasesJavier[interactionCount % frasesJavier.length],
                radius: Math.max(120, Math.hypot(x - centerX, y - centerY)),
                angle: Math.atan2(y - centerY, x - centerX),
                speed: (0.001 + Math.random() * 0.002) * (Math.random() > 0.5 ? 1 : -1),
                color: `hsl(${220 + Math.random() * 40}, 80%, 85%)`,
                dom: null
            };
            astros.push(astro);
            
            const div = document.createElement('div');
            div.className = 'astro-word';
            div.innerText = astro.text;
            div.style.color = astro.color;
            div.style.fontSize = '12px';
            document.getElementById('astros-layer').appendChild(div);
            astro.dom = div;
        }

        function runSequence() {
            isSequenceRunning = true;
            formationBtn.style.opacity = '0';
            
            // 1. Agrupar frases en forma de A
            astros.forEach((a, i) => {
                const target = formationCoords[i % formationCoords.length];
                a.dom.style.left = `${centerX + target.x}px`;
                a.dom.style.top = `${centerY + target.y}px`;
                a.dom.style.opacity = '0.4';
            });

            // 2. Desvanecer frases y mostrar ANGELES
            setTimeout(() => {
                astros.forEach(a => a.dom.style.opacity = '0');
                angelesContainer.style.opacity = '1';
                
                // Escalar letras
                letters.forEach((l, i) => {
                    setTimeout(() => {
                        l.style.transform = 'scale(2.5)';
                        l.style.margin = '0 15px';
                    }, i * 100);
                });

                // 3. El Salto y conversión a constelación
                setTimeout(() => {
                    constellationStars = [];
                    letters.forEach((l, i) => {
                        const rect = l.getBoundingClientRect();
                        const startX = rect.left + rect.width/2;
                        const startY = rect.top + rect.height/2;

                        // Posición de constelación aleatoria
                        const targetX = Math.random() * (window.innerWidth * 0.6) + (window.innerWidth * 0.2);
                        const targetY = Math.random() * (window.innerHeight * 0.4) + (window.innerHeight * 0.2);
                        
                        const star = { x: startX, y: startY };
                        constellationStars.push(star);

                        // Animación de salto
                        l.style.transition = 'all 2s cubic-bezier(0.68, -0.55, 0.27, 1.55)';
                        l.style.position = 'fixed';
                        l.style.left = `${startX}px`;
                        l.style.top = `${startY}px`;
                        
                        setTimeout(() => {
                            l.style.left = `${targetX}px`;
                            l.style.top = `${targetY}px`;
                            l.style.transform = 'scale(0.1)';
                            l.style.opacity = '0';
                            
                            // Sincronizar punto de constelación
                            let progress = 0;
                            const moveStar = () => {
                                progress += 0.01;
                                star.x = startX + (targetX - startX) * progress;
                                star.y = startY + (targetY - startY) * progress;
                                if (progress < 1) requestAnimationFrame(moveStar);
                            };
                            moveStar();
                        }, 100);
                    });
                    drawConstellation();

                    // 4. Mostrar diálogo final
                    setTimeout(() => {
                        const dialog = document.getElementById('final-dialog');
                        dialog.style.display = 'flex';
                        setTimeout(() => dialog.style.opacity = '1', 100);
                    }, 3500);

                }, 3000);

            }, 2000);
        }

        function answer(isYes) {
            const text = document.getElementById('dialog-text');
            const actions = document.getElementById('dialog-actions');
            text.style.opacity = '0';
            setTimeout(() => {
                text.innerText = "Te Quiero. No dejes que nadie apague tu Brillo ✨";
                text.style.fontSize = "16px";
                text.style.textTransform = "none";
                text.style.opacity = '1';
                actions.style.display = 'none';
            }, 500);
        }

        function animate() {
            if (!isSequenceRunning) {
                astros.forEach(a => {
                    a.angle += a.speed;
                    const x = centerX + Math.cos(a.angle) * a.radius;
                    const y = centerY + Math.sin(a.angle) * a.radius;
                    a.dom.style.left = `${x}px`;
                    a.dom.style.top = `${y}px`;
                    a.dom.style.transform = 'translate(-50%, -50%)';
                });
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousedown', e => spawnAstro(e.clientX, e.clientY));
        window.addEventListener('touchstart', e => spawnAstro(e.touches[0].clientX, e.touches[0].clientY), {passive: true});
        formationBtn.addEventListener('click', e => { e.stopPropagation(); runSequence(); });
        
        window.addEventListener('resize', () => {
            centerX = window.innerWidth / 2;
            centerY = window.innerHeight / 2;
            initParticles();
        });

        initParticles();
        drawParticles();
        animate();
    </script>
</body>
</html>
